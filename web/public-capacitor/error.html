<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Neo — connection</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: #0a0a12;
        color: #e6e6ea;
        text-align: center;
      }
      button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        background: #00d4ff;
        color: #07121b;
        font-weight: 700;
        font-size: 1rem;
        padding: 12px 24px;
      }
      button:active {
        transform: scale(0.98);
      }
    </style>
  </head>
  <body>
    <p id="statusText" style="margin: 0 0 16px; font-size: 0.95rem; opacity: 0.9">
      Connection failed. Try local refresh, or open production inside app.
    </p>
    <div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center">
      <button type="button" id="refreshBtn">Retry connection</button>
      <button type="button" id="prodBtn" style="background: #22c55e; color: #062a12">
        Open Production
      </button>
    </div>
    <script>
      // Capacitor's bridge can be incomplete on errorPath pages.
      (function () {
        var cap = window.Capacitor || {};
        if (typeof cap.triggerEvent !== "function") {
          cap.triggerEvent = function () {};
        }
        window.Capacitor = cap;
      })();

      /** Primary URL from Capacitor (production or dev); fallback for bare open. */
      function resolvePrimaryServerUrl() {
        try {
          var w = window.WEBVIEW_SERVER_URL;
          if (w && String(w).indexOf("http") === 0) {
            var s = String(w).trim();
            return s.endsWith("/") ? s : s + "/";
          }
        } catch (_) {}
        try {
          var c = window.Capacitor;
          if (c && typeof c.getServerUrl === "function") {
            var u = c.getServerUrl();
            if (u && String(u).indexOf("http") === 0) {
              var t = String(u).trim();
              return t.endsWith("/") ? t : t + "/";
            }
          }
        } catch (_) {}
        return "http://127.0.0.1:3000/";
      }

      function isDevServerTarget(url) {
        try {
          return /127\.0\.0\.1|localhost|10\.0\.2\.2|:3000\/?$/i.test(String(url || ""));
        } catch (_) {
          return false;
        }
      }

      function openInApp(url) {
        try {
          window.location.replace(url);
        } catch (_) {
          window.location.href = url;
        }
      }

      var primaryUrl = resolvePrimaryServerUrl();

      document.getElementById("refreshBtn").addEventListener("click", function () {
        openInApp(primaryUrl);
      });

      document.getElementById("prodBtn").addEventListener("click", function () {
        try {
          window.location.assign("https://myneoxai.com");
        } catch (_) {
          window.location.href = "https://myneoxai.com";
        }
      });

      try {
        var statusEl = document.getElementById("statusText");
        var current = String(window.location.href || "");
        var isCapacitorLocalHost =
          current.indexOf("localhost") !== -1 || current.indexOf("127.0.0.1") !== -1;
        /* This page is always served from https://localhost/ even when server.url failed was production. */
        if (isCapacitorLocalHost && isDevServerTarget(primaryUrl)) {
          statusEl.innerHTML =
            "<strong>PC dev server not reached.</strong><br /><br />" +
            "Capacitor target: <code id=\"devUrlLabel\"></code><br /><br />" +
            "<strong>Easiest (USB):</strong> PC folder <code>web</code> &rarr; <code>npm run android:local</code> " +
            "(Next + adb reverse + cap sync). Then Rebuild app.<br /><br />" +
            "<strong>Manual:</strong> <code>npm run dev</code> + <code>adb reverse tcp:3000 tcp:3000</code>.<br />" +
            "<strong>No USB:</strong> same Wi-Fi &rarr; <code>npm run android:local:wifi</code>.<br />" +
            "Firewall: allow Node on port 3000. VoLTE/USB issues &rarr; try Wi-Fi mode.<br /><br />" +
            "Or <strong>Open Production</strong>.";
          var lab = document.getElementById("devUrlLabel");
          if (lab) lab.textContent = primaryUrl.replace(/\/$/, "");
        } else if (isCapacitorLocalHost) {
          statusEl.innerHTML =
            "<strong>Could not load Neo from the server.</strong><br /><br />" +
            "Primary URL: <code id=\"devUrlLabel\"></code><br /><br />" +
            "Check mobile data / Wi-Fi, disable VPN or captive portal, then tap <strong>Retry</strong>. " +
            "If this repeats, the host may be slow or blocked — try again in a few seconds (the app also retries automatically).";
          var lab2 = document.getElementById("devUrlLabel");
          if (lab2) lab2.textContent = primaryUrl.replace(/\/$/, "");
        }
      } catch (_) {}
    </script>
  </body>
</html>
