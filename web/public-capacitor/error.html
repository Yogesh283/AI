<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Neo — connection</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: #0a0a12;
        color: #e6e6ea;
        text-align: center;
      }
      button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        background: #00d4ff;
        color: #07121b;
        font-weight: 700;
        font-size: 1rem;
        padding: 12px 24px;
      }
      button:active {
        transform: scale(0.98);
      }
    </style>
  </head>
  <body>
    <button type="button" id="refreshBtn">Refresh</button>
    <script>
      // Capacitor's bridge can be unavailable on errorPath pages.
      // Provide a tiny no-op shim so WebView console does not spam triggerEvent errors.
      (function () {
        var cap = window.Capacitor || {};
        if (typeof cap.triggerEvent !== "function") {
          cap.triggerEvent = function () {};
        }
        window.Capacitor = cap;
      })();

      // In-app reload only (same WebView page), never opens Chrome.
      document.getElementById("refreshBtn").addEventListener("click", function () {
        location.reload();
      });
    </script>
  </body>
</html>
