apply plugin: 'com.android.application'

/* Production: copy web/android/keystore.properties.example → keystore.properties (gitignored).
   web/scripts/build-release-apk.ps1 requires it unless you pass -AllowDebugSigning.
   If keystore.properties is missing, release still signs with debug (local iteration only). */
def neoKeystoreProps = new Properties()
def neoKeystoreFile = rootProject.file("keystore.properties")
if (neoKeystoreFile.exists()) {
    neoKeystoreFile.withInputStream { neoKeystoreProps.load(it) }
}

android {
    namespace = "com.neo.assistant"
    compileSdk = rootProject.ext.compileSdkVersion
    buildFeatures {
        buildConfig true
    }
    /* play = store id com.neo.assistant. sideload = com.neo.assistant.sideload (installs beside Play; own Google OAuth client may be needed). */
    flavorDimensions += "channel"
    productFlavors {
        play {
            dimension "channel"
            /* Without this, the IDE often targets a non-existent plain "debug" redirect path; default = playDebug. */
            isDefault true
        }
        sideload {
            dimension "channel"
            applicationIdSuffix ".sideload"
            versionNameSuffix "-sd"
        }
    }
    signingConfigs {
        debug {
            /* v1–v3: broader OEM / sideload installer compatibility than v2-only */
            enableV1Signing true
            enableV2Signing true
            enableV3Signing true
        }
        neoSideload {
            enableV1Signing true
            enableV2Signing true
            enableV3Signing true
            enableV4Signing true
            if (neoKeystoreFile.exists()) {
                storeFile file(neoKeystoreProps["storeFile"])
                storePassword neoKeystoreProps["storePassword"]
                keyAlias neoKeystoreProps["keyAlias"]
                keyPassword neoKeystoreProps["keyPassword"]
            }
        }
    }
    defaultConfig {
        applicationId "com.neo.assistant"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        def pvKey = (project.findProperty("PV_ACCESS_KEY") ?: System.getenv("PV_ACCESS_KEY") ?: "").toString()
        buildConfigField "String", "PV_ACCESS_KEY", "\"${pvKey.replace('"', '\\"')}\""
        /* Bump so sideload updates beat older installs; raise again if Play/internal builds use higher codes. */
        versionCode 22
        versionName "1.7.0"
        // Phone APKs only — drops x86/x86_64 Porcupine libs (smaller, fewer installer edge cases).
        ndk {
            abiFilters "arm64-v8a", "armeabi-v7a"
        }
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    /* Was android:extractNativeLibs=true in manifest; AGP wants this in DSL. Compressed .so → extracted at install. */
    packaging {
        jniLibs {
            useLegacyPackaging true
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (neoKeystoreFile.exists()) {
                signingConfig signingConfigs.neoSideload
            } else {
                // Sideload testing: debug keystore. Cannot install over Play Store build — uninstall com.neo.assistant first.
                signingConfig signingConfigs.debug
            }
        }
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    // 4.x includes 16 KB page-size aligned native libs (Android 15+); 3.0.x can fail install on newer devices.
    implementation "ai.picovoice:porcupine-android:4.0.0"
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}

/*
 * Android Studio "Run app" sometimes looks for intermediates/.../apk_ide_redirect_file/debug/...
 * even when the only debug variants are playDebug / sideloadDebug. Copy the real redirect so Run works.
 */
afterEvaluate {
    def mirror = { String fromSuffix ->
        def src = file("${buildDir}/intermediates/apk_ide_redirect_file/${fromSuffix}/redirect.txt")
        def destDir = file("${buildDir}/intermediates/apk_ide_redirect_file/debug/createDebugApkListingFileRedirect")
        if (src.exists()) {
            destDir.mkdirs()
            copy { from src; into destDir }
        }
    }
    tasks.matching { it.name == "createPlayDebugApkListingFileRedirect" }.configureEach {
        it.doLast { mirror("playDebug/createPlayDebugApkListingFileRedirect") }
    }
    tasks.matching { it.name == "createSideloadDebugApkListingFileRedirect" }.configureEach {
        it.doLast { mirror("sideloadDebug/createSideloadDebugApkListingFileRedirect") }
    }
}
